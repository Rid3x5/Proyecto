<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Química Proyecto</title>
    
    <style>
    body { 
        font-family: sans-serif; 
        background: #121212; 
        color: white; 
        text-align: center; 
        margin: 0; padding: 20px; 
    }
    h1 { color: #ff001ed4; } 
        
    .grid { 
        display: flex; flex-wrap: wrap;
        justify-content: center; gap: 15px; max-width: 900px; margin: 20px auto; 
    }
        
    .el-card { 
        width: 90px; height: 110px; background: #2a2a2a; border: 2px solid #555; 
        border-radius: 12px; cursor: pointer; transition: 0.3s;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
        
    .el-card:hover { border-color: #ff0400; transform: scale(1.05); }
        
    .el-card.active { background: #007e97; border-color: #cac8c8; transform: scale(1.1); box-shadow: 0 0 15px #dbdad6; z-index: 10; }
        
    .el-card.compatible { border-color: #b4b4b4; box-shadow: 0 0 10px rgba(163, 175, 76, 0.4); }
        
    .el-card.incompatible { opacity: 0.2; pointer-events: none; filter: grayscale(100%); }

    .simb { font-size: 28px; font-weight: bold; } 
    .val { font-size: 13px; color: #aaa; margin-top: 5px; }
        
    #pantalla { 
        background: #1e1e1e; border: 2px solid #ff2600; border-radius: 15px;
        padding: 30px; width: 90%; max-width: 700px; margin: 30px auto; min-height: 200px;
    }
    .formula-grande { font-size: 4rem; color: #ff4000; margin: 15px 0; letter-spacing: 2px; } 
    .nombre-comp { font-size: 1.8rem; font-weight: bold; }
    .badge { background: #333; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-bottom: 15px; display: inline-block; border: 1px solid #ff0000; }
        
    .explicacion { text-align: left; background: #2a2a2a; padding: 20px; border-radius: 10px; margin-top: 20px; font-size: 1.1rem; line-height: 1.6; border-left: 5px solid #00ffcc; }
    .explicacion highlight { color: #ff0000; font-weight: bold; } 
        
    button { padding: 12px 25px; cursor: pointer; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; transition: 0.2s; margin-top: 20px;}
    button:hover { background: #00ccaa; }

    @media (max-width: 600px) {
        body { padding: 10px; } h1 { font-size: 1.8rem; } p { font-size: 0.9rem; margin: 5px 0; }
        .grid { gap: 8px; margin: 10px auto; } .el-card { width: 68px; height: 85px; border-radius: 8px; }
        .simb { font-size: 22px; } .val { font-size: 10px; margin-top: 2px; }
        #pantalla { padding: 15px; width: 95%; margin: 15px auto; min-height: auto; box-sizing: border-box; }
        .formula-grande { font-size: 2.5rem; margin: 10px 0; } .nombre-comp { font-size: 1.3rem; }
        .explicacion { padding: 12px; font-size: 0.9rem; margin-top: 15px; } button { width: 100%; max-width: 280px; padding: 14px; font-size: 0.95rem; }
    }
    </style>
</head>
<body>

    <p>Combinacion de elementos químicos</p>
    <h1>Proyecto de química</h1>

    <div class="grid" id="grid"></div>

    <div id="pantalla">
        <div id="resultado" style="color: #3a919b; font-size: 1.2rem;">Seleccione un elemento</div>
    </div>

    <button onclick="location.reload()">Presione este boton para reiniciar</button>

    <script>

        const elementos = [
        { s: "H", n: "Hidrógeno", en: 2.20, v: 1, ev: 1, t: "NM" },
        { s: "Li", n: "Litio", en: 1.00, v: 1, ev: 1, t: "M" },
        { s: "Na", n: "Sodio", en: 0.93, v: 1, ev: 1, t: "M" },
        { s: "K", n: "Potasio", en: 0.82, v: 1, ev: 1, t: "M" },
        { s: "Rb", n: "Rubidio", en: 0.82, v: 1, ev: 1, t: "M" },
        { s: "Cs", n: "Cesio", en: 0.79, v: 1, ev: 1, t: "M" },
        { s: "Be", n: "Berilio", en: 1.60, v: 2, ev: 2, t: "M" },
        { s: "Mg", n: "Magnesio", en: 1.30, v: 2, ev: 2, t: "M" },
        { s: "Ca", n: "Calcio", en: 1.30, v: 2, ev: 2, t: "M" },
        { s: "Sr", n: "Estroncio", en: 0.95, v: 2, ev: 2, t: "M" },
        { s: "Ba", n: "Bario", en: 0.89, v: 2, ev: 2, t: "M" },
        { s: "B", n: "Boro", en: 2.00, v: 3, ev: 3, t: "NM" },
        { s: "Al", n: "Aluminio", en: 1.60, v: 3, ev: 3, t: "M" },
        { s: "Ga", n: "Galio", en: 1.60, v: 3, ev: 3, t: "M" },
        { s: "In", n: "Indio", en: 1.80, v: 3, ev: 3, t: "M" },
        { s: "Tl", n: "Talio", en: 2.00, v: 3, ev: 3, t: "M" },
        { s: "C", n: "Carbono", en: 2.60, v: -4, ev: 4, t: "NM" },
        { s: "Si", n: "Silicio", en: 1.90, v: -4, ev: 4, t: "NM" },
        { s: "Ge", n: "Germanio", en: 2.00, v: -4, ev: 4, t: "NM" },
        { s: "Sn", n: "Estaño", en: 2.00, v: 4, ev: 4, t: "M" },
        { s: "Pb", n: "Plomo", en: 2.30, v: 4, ev: 4, t: "M" },
        { s: "N", n: "Nitrógeno", en: 3.00, v: -3, ev: 5, t: "NM" },
        { s: "P", n: "Fósforo", en: 2.20, v: -3, ev: 5, t: "NM" },
        { s: "As", n: "Arsénico", en: 2.20, v: -3, ev: 5, t: "NM" },
        { s: "Sb", n: "Antimonio", en: 2.10, v: -3, ev: 5, t: "NM" },
        { s: "Bi", n: "Bismuto", en: 2.00, v: 3, ev: 5, t: "M" },
        { s: "O", n: "Oxígeno", en: 3.40, v: -2, ev: 6, t: "NM" },
        { s: "S", n: "Azufre", en: 2.60, v: -2, ev: 6, t: "NM" },
        { s: "Se", n: "Selenio", en: 2.60, v: -2, ev: 6, t: "NM" },
        { s: "Te", n: "Telurio", en: 2.10, v: -2, ev: 6, t: "NM" },
        { s: "Po", n: "Polonio", en: 2.00, v: -2, ev: 6, t: "NM" },
        { s: "F", n: "Flúor", en: 4.00, v: -1, ev: 7, t: "NM" },
        { s: "Cl", n: "Cloro", en: 3.20, v: -1, ev: 7, t: "NM" },
        { s: "Br", n: "Bromo", en: 3.00, v: -1, ev: 7, t: "NM" },
        { s: "I", n: "Yodo", en: 2.70, v: -1, ev: 7, t: "NM" }
        ];

        const nombres = { 
            "Cl": "Cloruro", "F": "Fluoruro", "Br": "Bromuro", "I": "Yoduro",
            "O": "Óxido", "S": "Sulfuro", "Se": "Seleniuro", "Te": "Telururo", "Po": "Poloniuro",
            "N": "Nitruro", "P": "Fosfuro", "As": "Arseniuro", "Sb": "Antimoniuro",
            "C": "Carburo", "Si": "Siliciuro", "Ge": "Germaniuro",
            "H": "Hidruro", "B": "Boruro"
        };

        let seleccion = [];

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = ''; 
            elementos.forEach((el, index) => {
                const div = document.createElement('div');
                div.className = 'el-card';
                div.id = `card-${index}`; 
                div.innerHTML = `<span class="simb">${el.s}</span><span class="val">${el.n}</span>`;
                div.onclick = () => manejarSeleccion(el, index); 
                container.appendChild(div); 
            });
        }

        function manejarSeleccion(el, index) {
            if (seleccion.length >= 2) return; 

            const cardSeleccionada = document.getElementById(`card-${index}`);
            
            if (seleccion.length === 0) {
                seleccion.push(el); 
                cardSeleccionada.classList.add('active'); 
                
                document.getElementById('resultado').innerHTML = `Primer clic ejecutado: <b>${el.n}</b>. Filtrando el espacio de interacción real para el segundo clic.`;
                
                resaltarCompatibles(el, index); 
            } 
            else if (seleccion.length === 1) {
                seleccion.push(el); 
                cardSeleccionada.classList.add('active'); 
                procesar(); 
            }
        }

        function resaltarCompatibles(primerElemento, indicePrimerElemento) {
            elementos.forEach((el, index) => {
                const card = document.getElementById(`card-${index}`);

                if (index === indicePrimerElemento) return; 

                if (primerElemento.t === "M" && el.t === "M") {
                    card.classList.add('incompatible'); 
                } else {
                    card.classList.add('compatible'); 
                }
            });
        }

        function procesar() {
            const [a, b] = seleccion; 
            const res = document.getElementById('resultado');

            let caption = a.en < b.en ? a : b;
            let anion = a.en < b.en ? b : a;

            if (a.s === b.s) {
                res.innerHTML = `
                    <div class="badge">Nivel B: Resultado Químico Único</div>
                    <div class="nombre-comp">${a.n} diatómico</div>
                    <div class="formula-grande">${a.s}<sub>2</sub></div> 
                    <div class="explicacion">
                        <p><b>Normalización por electronegatividad:</b> Elementos idénticos detectados. El sistema colapsa el duplicado molecular y genera una molécula diatómica pura.</p>
                    </div>
                `;
                return; 
            }

            let valC = Math.abs(caption.v);
            let valA = Math.abs(anion.v);
            
            const mcd = (x, y) => y === 0 ? x : mcd(y, x % y);
            let div = mcd(valC, valA); 
            
            let subC = valA / div;
            let subA = valC / div;

            let nombreFinal = `${nombres[anion.s] || anion.s} de ${caption.n}`;
            
            let formula = `${caption.s}${subC > 1 ? `<sub>${subC}</sub>` : ""}${anion.s}${subA > 1 ? `<sub>${subA}</sub>` : ""}`;
            
            let diffEn = Math.abs(a.en - b.en).toFixed(2);
            
            let tipoEnlace = diffEn >= 1.7 ? "Iónico" : "Covalente";

            // Normalización matemática para que los enlaces No Metal + No Metal no dupliquen cargas negativas
            let cargaCation = caption.t === "NM" && anion.t === "NM" ? Math.abs(caption.v) : caption.v;
            let cargaAnion = anion.v;

            // Motor de cálculo numérico real ejecutado por JS
            let balanceCargas = (subC * cargaCation) + (subA * cargaAnion);

            let textoExplicativo = `
                <div class="explicacion">
                    <p>El <b>${caption.n}</b> posee un electronegatividad de ${caption.en} y el <b>${anion.n}</b> de ${anion.en}. La diferencia (ΔEn) es de <b>${diffEn}</b>  clasificando el enlace como <b>${tipoEnlace}</b>.</p>
                    <p>Se ejecuta el cruce de valencias modificado por simplificación. Relación estequiométrica: ${subC} átomo(s) de ${caption.n} por ${subA} átomo(s) de ${anion.n}.</p>
                    <p><b>Operación y balance de cargas:</b> (${subC} × ${cargaCation}) + (${subA} × ${cargaAnion}) = <b>${balanceCargas}</b>. Estabilidad eléctrica de la entidad molecular validada.</p>
                </div>
            `;

            res.innerHTML = `
                <div class="badge">Nivel B: Resultado Químico Único</div>
                <div class="nombre-comp">${nombreFinal}</div>
                <div class="formula-grande">${formula}</div>
                ${textoExplicativo}
            `;
        }

        render();
    </script>
</body>
</html>
